name: Run Tests

permissions:
    contents: read

defaults:
    run:
        shell: bash

on:
    push:
        branches:
            - main
        paths:
            - .github/workflows/analyze.yml
            - src/**
            - rokit.toml
            - .luaurc

    pull_request:
    workflow_dispatch:
    merge_group:

jobs:
    analysis:
        name: Analysis
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  # only checkout files which are needed for analysis
                  sparse-checkout: |
                      .luaurc
                      rokit.toml
                      lune/
                      src/
                  sparse-checkout-cone-mode: false

            - name: Setup Rokit
              uses: CompeyDev/setup-rokit@v0.1.2

            - name: Setup Lune
              run: lune setup

            - name: Perform Lints
              run: luaulsp analyze --base-luaurc=.luaurc --platform=standard --flag:LuauSolverV2=true --flag:LuauIntegerType=true --flag:LuauIntegerLibrary=true src > lint-result.txt

            - name: Upload Artifact
              if: ${{ always() && github.repository == '' }}
              uses: actions/upload-artifact@v4
              with:
                  name: lint-result
                  path: lint-result.txt
