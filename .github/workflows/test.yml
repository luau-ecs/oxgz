name: Tests

on: [push, pull_request, workflow_dispatch]

jobs:
    run:
        name: Run Luau Tests
        runs-on: ubuntu-latest
        timeout-minutes: 2

        steps:
            - name: Checkout Project
              uses: actions/checkout@v4

            - name: Setup Rokit
              uses: CompeyDev/setup-rokit@v0.1.2

            - name: Run Unit Tests
              id: run_tests
              run: lune run test
