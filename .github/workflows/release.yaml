name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    id-token: write
    contents: write

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Project
              uses: actions/checkout@v4

            - name: Install Rokit
              uses: CompeyDev/setup-rokit@v0.1.2

            - name: Install Dependencies
              run: wally install

            - name: Build
              run: rojo build --output build.rbxm default.project.json

            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: build
                  path: build.rbxm

    release:
        name: Release
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Project
              uses: actions/checkout@v4

            - name: Download Build
              uses: actions/download-artifact@v4
              with:
                  name: build
                  path: build

            - name: Rename Build
              run: mv build/build.rbxm oxgz.rbxm

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  name: Op Xenon Gandalf Zebra ${{ github.ref_name }}
                  tag_name: ${{ github.ref_name }}
                  files: oxgz.rbxm

    publish-wally:
        name: Publish to Wally
        needs: release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Project
              uses: actions/checkout@v4

            - name: Install Rokit
              uses: CompeyDev/setup-rokit@v0.1.2

            - name: Wally Login
              run: wally login --token ${{ secrets.WALLY_AUTH_TOKEN }}

            - name: Publish
              run: lune run release
